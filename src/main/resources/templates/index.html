<!DOCTYPE html>

<html lang="pt-br" 
xmlns:th="http://www.thymeleaf.org" 
xmlns:sec="http://www.thymeleaf.org/extras/spring-security" 
> <!-- Sempre que usar o thymeleaf precisa passar o endereço dele. “Tudo que começar com th: pertence ao Thymeleaf.” -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <!-- Mensagens de feedback -->
  <div th:if="${param.error}">E-mail ou senha inválidos!</div>
  <div th:if="${param.logout}">Você saiu com sucesso.</div>

  <!-- Spring Security intercepta este POST — sem método no Controller -->
  <form th:action="@{/login}" method="post">
    <input type="email" name="username" required /> <!-- Os campos name="username" e name="password" devem se chamar assim para serem reconhecidos pelo Spring Security. É o padrão esperado -->
    <input type="password" name="password" required />
    <button type="submit">Entrar</button>
  </form>

</body>

</html>
